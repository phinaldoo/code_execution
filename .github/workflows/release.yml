name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.ref_name == 'main' || github.ref_name == 'master'
    runs-on: ubuntu-latest

    env:
      APP_ENV: development
      REQUIRE_AUTH: "true"
      METRICS_AUTH_REQUIRED: "true"
      API_KEYS: ci:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      CORS_ALLOW_ORIGINS: https://ci.example.invalid
      USE_DOCKER_DEFAULT_SECCOMP: "true"
      SANDBOX_NETWORK_MODE: bridge
      ALLOW_PIP_INSTALLS: "true"

    steps:
      - name: Check out repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip bandit pip-audit
          python -m pip install -r gateway/requirements.txt

      - name: Bump version files
        id: bump
        run: |
          python .github/scripts/bump_version.py "${{ inputs.bump }}" >> "$GITHUB_OUTPUT"

      - name: Validate bumped files
        run: |
          docker compose config -q
          python -m compileall -q gateway sandbox tests/verification_client.py tests/verify_vm_flow.py tests/verify_playwright.py tests/verify_features.py tests/test_execution.py tests/test_gateway_unit.py .github/scripts
          python -m unittest -q tests/test_gateway_unit.py
          bandit -q -r gateway sandbox
          pip-audit -r gateway/requirements.txt
          pip-audit -r sandbox/requirements.txt
          python - <<'PY'
          import json
          import pathlib
          import re

          root = pathlib.Path.cwd()
          payload = json.loads((root / "gateway/version.json").read_text(encoding="utf-8"))
          version = payload.get("version")
          tag = payload.get("tag")
          if not isinstance(version, str) or not re.fullmatch(r"(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)", version):
              raise SystemExit(f"Invalid version payload: {payload}")
          if tag != f"v{version}":
              raise SystemExit(f"Version tag mismatch: {payload}")
          print(f"Validated version {version}")
          PY

      - name: Commit and tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gateway/version.json
          git commit -m "release: v${{ steps.bump.outputs.version }}"
          git tag -a "v${{ steps.bump.outputs.version }}" -m "v${{ steps.bump.outputs.version }}"
          git push origin HEAD --follow-tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --verify-tag \
            --title "${{ steps.bump.outputs.tag }}" \
            --generate-notes
